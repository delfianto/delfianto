[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E402"]

[tool.basedpyright]
include = ["scripts", "skills"]
extraPaths = ["scripts"]
pythonVersion = "3.11"
typeCheckingMode = "standard"
reportMissingTypeStubs = false
